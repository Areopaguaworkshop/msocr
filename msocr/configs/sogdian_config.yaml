# Sogdian Manuscript HTR Training Configuration

# Dataset configuration
dataset:
  language: "sogdian"
  format_type: "xml"  # ALTO or PAGE XML format
  
# Model architecture configuration
model:
  # VGSL specification for Sogdian script
  # Optimized for complex script with multiple diacritics
  spec: "[1,120,0,1 Cr3,13,32 Do0.1,2 Mp2,2 Cr3,13,32 Do0.1,2 Mp2,2 Cr3,9,64 Do0.1,2 Mp2,2 Cr3,9,64 Do0.1,2 S1(1x0)1,3 Lbx200 Do0.1,2 Lbx200 Do0.1,2 Lbx200 Do]"
  
  # Normalization for Sogdian script
  # ponytail: NFD decomposes diacritics (seyame, vowels, shewa) into separate CTC labels.
  # NFC collapsed them — wrong for Syriac/Sogdian. See docs/kraken-training-techniques-research.md §7.1.
  normalization: "NFD"
  
  # Script direction. Old Sogdian manuscript hands are treated as RTL in this project.
  base_dir: "R"

# Training configuration
training:
  # Optimizer settings
  optimizer: "Adam"
  # ponytail: 1e-4 for fine-tuning from sophro_mhiro_syriac base. 1e-3 is the from-scratch default;
  # fine-tuning needs lower LR to avoid catastrophic forgetting. See research doc §2.1, §11.2.
  # Key name is `lrate` to match ketos_trainer.py _train_subcmd_flags (was `learning_rate` — never read).
  lrate: 0.0001
  # ponytail: 0 for CTC recognition (Kraken rec default). Weight decay is for seg only (1e-5).
  weight_decay: 0
   
  # Training schedule
  # ponytail: cosine for fine-tuning (1cycle is for from-scratch). See research doc §2.2, §11.1.
  schedule: "cosine"
  # ponytail: warmup required with cosine fine-tune. 200 steps for similar-domain fine-tune.
  warmup: 200
  epochs: 100
  min_epochs: 20
  lag: 10  # Early stopping patience
  
  # Batch size (adjust based on GPU memory)
  batch_size: 16
  
  # Data augmentation
  augment: true
  augment_params:
    # Random rotation
    rotation_range: 5
    # Random scaling
    scale_range: 0.1
    # Random translation
    translation_range: 0.05
    # Elastic distortion
    elastic_distortion: true
  
  # Validation split
  validation_split: 0.2
  
  # Device configuration
  device: "auto"  # Will use GPU if available
  precision: "bf16-mixed"  # Mixed precision for GPU training
  workers: 4  # Number of data loading workers

# Preprocessing configuration
preprocessing:
  # Image size normalization
  target_height: 120
  target_width: 1200
  
  # Noise reduction
  denoise: true
  denoise_params:
    h: 10
    template_window_size: 7
    search_window_size: 21
  
  # Contrast enhancement
  # ponytail: off — CLAHE not statistically beneficial per TrOCR ablation 2026 (arXiv:2606.24302).
  # Kraken's --augment already covers lighting via OpticalDistortion + brightness. See research doc §4.3, §11.2.
  enhance_contrast: false
  clahe_clip_limit: 2.0
  clahe_grid_size: [8, 8]
   
  # Binarization
  # ponytail: off — Kraken reads grayscale; otsu binarization destroys faint ink.
  # Damaged manuscripts suffer most. See research doc §9.3, §11.1.
  binarize: false
  binarize_method: "otsu"
  blur_kernel_size: 5

# Model saving configuration
output:
  model_prefix: "sogdian_manuscript"
  save_frequency: 5  # Save model every N epochs
  save_best_only: true
  
# Logging configuration
logging:
  use_tensorboard: true
  log_dir: "logs/sogdian"
  log_frequency: 10  # Log every N steps
