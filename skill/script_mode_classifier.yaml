schema_version: msocr.docspec.v1
id: skill.script_mode_classifier
title: Script and Writing Mode Classifier Skill
purpose: Define classification and routing prerequisites for script, direction, and writing mode.
scope:
  project: msocr
  languages:
    - name: sogdian
      status: implemented
    - name: old_turkish
      status: implemented
    - name: greek
      status: planned
    - name: latin
      status: planned
    - name: syriac
      status: planned
    - name: coptic
      status: planned
  writing_modes:
    - printed
    - handwritten
inputs:
  required:
    - target_language
    - writing_mode
    - input_image_or_page
  optional:
    - auto_mode_allowed
    - scan_dpi
workflow:
  - step_id: C1
    name: validate_declared_mode
    action: Require explicit writing_mode in production plans.
  - step_id: C2
    name: detect_direction
    action: Set LTR or RTL constraints using language profile.
  - step_id: C3
    name: confidence_check
    action: If classification confidence is low, send to fallback pipeline.
metrics:
  primary:
    - classification_confidence
  secondary:
    - direction_consistency
thresholds:
  classifier:
    min_confidence: 0.80
  rule: Below threshold triggers low-confidence fallback and manual review candidate.
fallback:
  low_confidence_or_conflict:
    - run_dual_route_probe
    - compare_candidate_scores
    - set_needs_manual_review_true_if_unstable
outputs:
  artifacts:
    - route_decision
    - direction_tag
    - confidence_score
integration:
  implemented_modules:
    - msocr/preprocessing/pipeline.py
  planned_modules:
    - script_mode_classifier_service
status:
  maturity: planned_for_code
  implementation_state: documentation_defined
owners:
  - role: routing_logic
    team: msocr
last_updated: 2026-02-12
