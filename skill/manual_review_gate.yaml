schema_version: msocr.docspec.v1
id: skill.manual_review_gate
title: Manual Review Gate Skill
purpose: Define deterministic rules for escalation to human review.
scope:
  project: msocr
  languages:
    - name: sogdian
      status: active
    - name: old_turkish
      status: active
    - name: greek
      status: planned
    - name: latin
      status: planned
    - name: syriac
      status: planned
    - name: coptic
      status: planned
  writing_modes:
    - printed
    - handwritten
inputs:
  required:
    - cer
    - wer
    - writing_mode
    - route_confidence
  optional:
    - lexicon_consistency_score
workflow:
  - step_id: M1
    name: threshold_check
    action: Compare run metrics with route-specific acceptance targets.
  - step_id: M2
    name: confidence_check
    action: Mark unstable low-confidence runs for review.
  - step_id: M3
    name: decision_emit
    action: Emit needs_manual_review true or false with reasons.
metrics:
  primary:
    - CER
  secondary:
    - WER
thresholds:
  printed:
    cer_max: 0.05
  handwritten:
    cer_max: 0.10
  rule: Trigger manual review if either metric policy fails or routing confidence is unstable.
fallback:
  review_required:
    - lock_autocorrection
    - preserve_all_candidates
    - attach_review_reason_codes
outputs:
  artifacts:
    - needs_manual_review
    - review_reason_codes
    - candidate_outputs
integration:
  implemented_modules:
    - msocr/cli.py
  planned_modules:
    - review_queue_connector
status:
  maturity: active_blueprint
  implementation_state: documentation_defined
owners:
  - role: quality_control
    team: msocr
last_updated: 2026-02-12
