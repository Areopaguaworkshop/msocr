schema_version: msocr.docspec.v1
id: skill.engine_router
title: OCR and HTR Engine Router Skill
purpose: Select model engine and profile per language, mode, and direction while preserving conservative claims.
scope:
  project: msocr
  languages:
    - name: sogdian
      status: implemented
    - name: old_turkish
      status: implemented
    - name: greek
      status: planned
    - name: latin
      status: planned
    - name: syriac
      status: planned
    - name: coptic
      status: planned
  writing_modes:
    - printed
    - handwritten
inputs:
  required:
    - target_language
    - writing_mode
    - direction
    - classifier_confidence
  optional:
    - desired_accuracy
    - compute_budget
workflow:
  - step_id: R1
    name: profile_lookup
    action: Resolve language and writing mode profile.
  - step_id: R2
    name: model_selection
    action: Select primary model and fallback model candidate.
  - step_id: R3
    name: confidence_gate
    action: If confidence is low, perform dual-model sampling before accepting output.
metrics:
  primary:
    - model_selection_confidence
  secondary:
    - lexicon_consistency_score
thresholds:
  router:
    min_confidence: 0.80
  rule: If confidence or consistency is below threshold, require fallback path.
fallback:
  unstable_selection:
    - dual_model_sampling
    - choose_highest_combined_score
    - set_needs_manual_review_true_if_no_clear_winner
outputs:
  artifacts:
    - selected_model_id
    - fallback_model_id
    - route_trace
integration:
  implemented_modules:
    - msocr/models/inference.py
    - msocr/cli.py
  planned_modules:
    - language_aware_engine_router
    - external_connector_escriptorium
    - external_connector_transkribus
status:
  maturity: planned_for_code
  implementation_state: documentation_defined
owners:
  - role: model_routing
    team: msocr
last_updated: 2026-02-12
