# Old Turkish Manuscript OCR Training Configuration

# Dataset configuration
dataset:
  language: "old_turkish"
  format_type: "xml"  # ALTO or PAGE XML format
  
# Model architecture configuration
model:
  # VGSL specification for Old Turkish script
  # Optimized for Arabic-derived script with many connected characters
  spec: "[1,120,0,1 Cr3,13,32 Do0.1,2 Mp2,2 Cr3,13,32 Do0.1,2 Mp2,2 Cr3,9,64 Do0.1,2 Mp2,2 Cr3,9,64 Do0.1,2 S1(1x0)1,3 Lbx200 Do0.1,2 Lbx200 Do0.1,2 Lbx200 Do]"
  
  # Normalization for Old Turkish script
  normalization: "NFC"  # Unicode normalization form
  
  # Script direction (right-to-left)
  base_dir: "R"  # Right-to-left for Old Turkish

# Training configuration
training:
  # Optimizer settings
  optimizer: "Adam"
  learning_rate: 0.001
  weight_decay: 0.0001
  
  # Training schedule
  schedule: "1cycle"
  epochs: 100
  min_epochs: 20
  lag: 10  # Early stopping patience
  
  # Batch size (adjust based on GPU memory)
  batch_size: 16
  
  # Data augmentation (more aggressive for Arabic script)
  augment: true
  augment_params:
    # Random rotation
    rotation_range: 3
    # Random scaling
    scale_range: 0.08
    # Random translation
    translation_range: 0.03
    # Elastic distortion (important for cursive scripts)
    elastic_distortion: true
    # Random perspective
    perspective_distortion: true
  
  # Validation split
  validation_split: 0.2
  
  # Device configuration
  device: "auto"  # Will use GPU if available
  precision: "bf16-mixed"  # Mixed precision for GPU training
  workers: 4  # Number of data loading workers

# Preprocessing configuration
preprocessing:
  # Image size normalization
  target_height: 120
  target_width: 1200
  
  # Noise reduction (important for old manuscripts)
  denoise: true
  denoise_params:
    h: 15  # Higher denoising for older manuscripts
    template_window_size: 7
    search_window_size: 21
  
  # Contrast enhancement
  enhance_contrast: true
  clahe_clip_limit: 3.0  # Higher contrast for Arabic script
  clahe_grid_size: [8, 8]
  
  # Binarization
  binarize: true
  binarize_method: "otsu"
  blur_kernel_size: 5
  
  # Script-specific preprocessing
  skew_correction: true
  baseline_normalization: true

# Model saving configuration
output:
  model_prefix: "old_turkish_manuscript"
  save_frequency: 5  # Save model every N epochs
  save_best_only: true
  
# Logging configuration
logging:
  use_tensorboard: true
  log_dir: "logs/old_turkish"
  log_frequency: 10  # Log every N steps