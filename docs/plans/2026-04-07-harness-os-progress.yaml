remaining_for_step_10:
  - wire HAR-backed runtime promotion and smoke validation for handwritten HTR artifacts once the HTR artifact contract is finalized
  - decide whether Gradio should become a separately deployed runtime after the handwritten runtime path exists, or remain a delegate/demo-only surface

known_risks:
  - the shared registry now unifies language metadata, but route selection is still hardcoded in msocr/pipelines/printed_ocr.py and msocr/service/runtime.py
  - Harness/RunPod orchestration modules described in docs do not exist yet; this step established the local manifest and benchmark contract layer only
  - annotation API now hydrates sessions, but segmentation quality still depends entirely on Kraken fallback behavior and lacks manual redraw/edit endpoints
  - IIIF support currently resolves the first canvas image only
  - DVC tracking is documented and surfaced on manifest metadata, but the repo does not yet enforce DVC sidecars or automate data publication
  - live Harness publication now authenticates non-interactively, but still depends on the external hc CLI binary being installed on the delegate or developer machine
  - RunPod retrieval currently requires an explicit remote file path plus SSH-capable pod access with rsync available on the caller machine
  - webhook notifications are best-effort and currently record delivery failures in state rather than retrying automatically
  - live runtime OCR smoke now depends on native OCR tooling being present on the selected delegate or target host; for the current Syriac printed path that means Tesseract must be installed where `msocr api` is launched
  - runtime HAR consumption currently targets the printed OCR route only; handwritten runtime promotion remains to be wired when the HTR artifact contract is finalized

