  - added automatic annotation-session page materialization, segmentation fallback, and crop generation
  - expanded annotation API responses with segmentation_engine, page_count, line_count, needs_manual_review, and lines
  - added a dedicated annotation-api CLI command instead of mounting the annotation app under the main OCR API
  - introduced a frozen manifest manager in msocr/data/manifest.py for manifest_id-based resolution of training and benchmark inputs
  - created a canonical data/manifests/ registry with a documented manifest schema aligned to the Harness upgrade docs
  - upgraded msocr benchmark to accept manifest_id, resolve frozen manifests, prefer holdout partitions, and emit metrics.json-compatible provenance fields
  - extended msocr train with split_manifest_id support so manifest-driven runs can resolve XML inputs from train/validation/holdout partitions
  - replaced the generic dataset splitter's file-level random split with manuscript_id-isolated partitions and richer split manifest output
  - added regression tests for manifest loading, manuscript overlap protection, and printed benchmark provenance reporting
  - added a manifest-aware RunPod orchestration client in msocr/pipeline/runpod_client.py that builds official REST pod payloads and supports submit/poll/stop flows
  - added a Harness Artifact Registry adapter in msocr/pipeline/har_client.py that wraps the documented hc generic-package and metadata workflow for model bundles
  - extended the CLI with dry-run-first runpod-submit and har-publish commands so Harness/RunPod integration can be rehearsed locally before live submission
  - added focused orchestration tests covering GPU-tier selection, manifest-derived RunPod payloads, and HAR bundle publication planning
  - added a higher-level pipeline-submit workflow that chains manifest-aware RunPod submission, benchmark evaluation, policy gating, and HAR publication from one entrypoint
  - taught the printed benchmark path to accept default model and engine overrides so the promotion workflow can evaluate the same artifact it plans to publish
  - added explicit Tesseract traineddata override support for printed Syriac, Coptic, Armenian, and Geez routes to benchmark newly trained local artifacts
  - automated Dockerfile.sha sidecar generation from the real Dockerfile input during promotion rather than relying on manual sidecar assembly
  - added workflow regression tests covering gate behavior, successful promotion, and printed OCR traineddata override routing
  - added RunPod rsync-over-SSH model retrieval so pipeline-submit can fetch a declared remote artifact into the pipeline output tree before benchmark and promotion
  - enabled SSH-capable RunPod pod planning with optional SSH_PUBLIC_KEY injection for non-interactive delegate-driven retrieval
  - persisted pipeline state.json snapshots and notification.json payloads under output/pipelines/<run>/<artifact>/ for structured step-level status reporting
  - added optional webhook notification delivery for policy-gate failures, workflow blocks, retrieval failures, and successful artifact promotions
  - taught the HAR adapter to perform non-interactive hc auth login from Harness delegate environment variables before publication
  - tightened pipeline-submit so benchmark and promotion are blocked unless a concrete model artifact is available locally or via RunPod retrieval
  - added regression tests covering SSH-enabled RunPod payloads, HAR delegate login planning, retrieval-backed promotion, and missing-artifact benchmark blocking
  - added HAR generic-artifact pull support so runtime and delegate workflows can download published model files by package/version/filename
  - added printed-runtime HAR model resolution with startup prefetch hooks for FastAPI and Gradio when deploy env vars point at a promoted artifact
  - authored a concrete delegate-oriented Harness pipeline example at pipeline/harness/syriac_printed_train_delegate.yaml that wires RunPod, HAR auth, runtime smoke testing, and notification envs together
  - added regression tests covering HAR pull command construction and printed runtime model resolution from HAR-backed deploy configuration
  - added deploy-oriented startup helpers so msocr api and msocr demo perform the same runtime preflight before launching the service process
  - added a runtime-smoke-check CLI command that validates deploy-time model resolution and can optionally run an end-to-end printed OCR smoke invocation
  - extended the delegate pipeline example with a deploy/runtime smoke stage that launches the real `uv run msocr api` runtime path with HAR envs and verifies both /health and /ocr
  - added deploy-helper regression tests covering HAR-backed smoke summaries and image-backed runtime smoke execution
  - added canonical Syriac runtime smoke assets under assets/runtime/ so deploy validation can use a repo-owned sample image instead of an ad hoc host file
  - extended runtime-smoke-check with live HTTP probing that waits for /health and posts a multipart OCR request against /ocr using the canonical sample image by default
  - replaced the delegate's Docker-only health probe with a process-based `uv run msocr api` runtime launch that exercises the same startup path as the deployed FastAPI service and verifies OCR end to end

decisions:
  - annotation_api remains a dedicated FastAPI app module served by the new msocr annotation-api command; merging into msocr/service/api.py is deferred
  - the legacy alias armenia remains accepted for compatibility, but all stored and returned language values are canonicalized to armenian
  - direct --gt-dir/--gt-file training remains available for ad hoc local runs, but reproducible training and benchmark paths now flow through manifest_id resolution
  - the HAR adapter uses the documented Harness CLI workflow rather than a guessed private API so artifact publication stays aligned with the current public product surface
  - the pipeline-level workflow blocks HAR promotion unless a benchmark manifest is supplied and the CER policy gate passes
  - RunPod artifact retrieval is implemented as declared remote-path rsync over exposed SSH rather than a guessed private artifact API, using the pod's public IP and mapped TCP port 22
  - delegate-friendly HAR authentication uses documented hc auth login --non-interactive with HARNESS_API_TOKEN/HARNESS_ACCOUNT_ID/HARNESS_ORG_ID/HARNESS_PROJECT_ID rather than assuming a pre-populated auth file
  - pipeline state updates are always written locally, while webhook notification delivery is best-effort and must not block a successful promotion
  - printed runtime deploys resolve promoted models either from an explicit local path or from HAR coordinates supplied as environment variables, with startup prefetch only when a package is fully specified
  - API and demo startup now fail fast by running the same runtime preflight that deployment smoke checks use, so bad HAR runtime configuration is detected before the service begins serving
  - deploy/runtime smoke alignment now uses the real `uv run msocr api` startup path plus a live /ocr request instead of a Docker-only /health probe, because the production contract is HAR-backed FastAPI startup rather than delegate-local container port publishing
  - Gradio remains a delegate/demo-only surface until handwritten runtime promotion exists and a separate deploy contract is defined for it

