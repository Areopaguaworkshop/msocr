remaining_for_step_5:
  - decide how trained model retrieval from RunPod should be automated so pipeline-submit can hand off a fetched local artifact instead of requiring --model-file
  - add structured notifications or state updates for policy-gate failures and successful promotions
  - decide how Harness secrets and registry context should be injected for non-interactive hc execution in CI delegates

known_risks:
  - the shared registry now unifies language metadata, but route selection is still hardcoded in msocr/pipelines/printed_ocr.py and msocr/service/runtime.py
  - Harness/RunPod orchestration modules described in docs do not exist yet; this step established the local manifest and benchmark contract layer only
  - annotation API now hydrates sessions, but segmentation quality still depends entirely on Kraken fallback behavior and lacks manual redraw/edit endpoints
  - IIIF support currently resolves the first canvas image only
  - DVC tracking is documented and surfaced on manifest metadata, but the repo does not yet enforce DVC sidecars or automate data publication
  - live Harness publication still depends on the external hc CLI being installed and authenticated on the delegate or developer machine
  - pipeline-submit still assumes the trained model artifact is already present locally after RunPod execution; automated retrieval is not implemented yet

next_recommended_action: step_6_model_retrieval_notifications_and_delegate_runtime_wiring
