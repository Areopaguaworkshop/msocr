plan_id: harness_os_upgrade
updated_at: 2026-04-09
current_phase: step_5_pipeline_level_submission_and_artifact_promotion
status: in_progress

completed:
  - created a canonical shared language registry in msocr/language_registry.py
  - standardized font metadata on web_font while keeping a compatibility mirror as font inside the shared registry
  - normalized the legacy language alias armenia to the canonical code armenian across CLI, runtime, annotation API, output handling, and printed OCR routing
  - removed the duplicated annotation-only language registry from msocr/data/session_manager.py
  - aligned pipeline/printed_ocr_training.yaml with the canonical armenian language code
  - fixed the annotation API contract so session creation and /api/languages return web_font consistently
  - implemented session hydration from local files, browser uploads, and IIIF manifests in msocr/data/session_manager.py
  - added automatic annotation-session page materialization, segmentation fallback, and crop generation
  - expanded annotation API responses with segmentation_engine, page_count, line_count, needs_manual_review, and lines
  - added a dedicated annotation-api CLI command instead of mounting the annotation app under the main OCR API
  - introduced a frozen manifest manager in msocr/data/manifest.py for manifest_id-based resolution of training and benchmark inputs
  - created a canonical data/manifests/ registry with a documented manifest schema aligned to the Harness upgrade docs
  - upgraded msocr benchmark to accept manifest_id, resolve frozen manifests, prefer holdout partitions, and emit metrics.json-compatible provenance fields
  - extended msocr train with split_manifest_id support so manifest-driven runs can resolve XML inputs from train/validation/holdout partitions
  - replaced the generic dataset splitter's file-level random split with manuscript_id-isolated partitions and richer split manifest output
  - added regression tests for manifest loading, manuscript overlap protection, and printed benchmark provenance reporting
  - added a manifest-aware RunPod orchestration client in msocr/pipeline/runpod_client.py that builds official REST pod payloads and supports submit/poll/stop flows
  - added a Harness Artifact Registry adapter in msocr/pipeline/har_client.py that wraps the documented hc generic-package and metadata workflow for model bundles
  - extended the CLI with dry-run-first runpod-submit and har-publish commands so Harness/RunPod integration can be rehearsed locally before live submission
  - added focused orchestration tests covering GPU-tier selection, manifest-derived RunPod payloads, and HAR bundle publication planning
  - added a higher-level pipeline-submit workflow that chains manifest-aware RunPod submission, benchmark evaluation, policy gating, and HAR publication from one entrypoint
  - taught the printed benchmark path to accept default model and engine overrides so the promotion workflow can evaluate the same artifact it plans to publish
  - added explicit Tesseract traineddata override support for printed Syriac, Coptic, Armenian, and Geez routes to benchmark newly trained local artifacts
  - automated Dockerfile.sha sidecar generation from the real Dockerfile input during promotion rather than relying on manual sidecar assembly
  - added workflow regression tests covering gate behavior, successful promotion, and printed OCR traineddata override routing

decisions:
  - annotation_api remains a dedicated FastAPI app module served by the new msocr annotation-api command; merging into msocr/service/api.py is deferred
  - the legacy alias armenia remains accepted for compatibility, but all stored and returned language values are canonicalized to armenian
  - direct --gt-dir/--gt-file training remains available for ad hoc local runs, but reproducible training and benchmark paths now flow through manifest_id resolution
  - the HAR adapter uses the documented Harness CLI workflow rather than a guessed private API so artifact publication stays aligned with the current public product surface
  - the pipeline-level workflow blocks HAR promotion unless a benchmark manifest is supplied and the CER policy gate passes

