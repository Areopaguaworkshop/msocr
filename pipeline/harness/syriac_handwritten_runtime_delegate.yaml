pipeline:
  name: msocr_syriac_handwritten_runtime_delegate
  identifier: msocr_syriac_handwritten_runtime_delegate
  projectIdentifier: msocr
  orgIdentifier: default
  tags:
    route: syriac-handwritten
    owner: msocr
    runtime: delegate
    surface: api-gradio
  variables:
    - name: delegateSelector
      type: String
      value: local
    - name: scriptVariant
      type: String
      value: default
    - name: harRegistry
      type: String
      value: msocr-models
    - name: harVersion
      type: String
      value: <+input>
    - name: harFilename
      type: String
      value: model.mlmodel
    - name: htrSmokeImagePath
      type: String
      value: <+input>
    - name: apiRuntimePort
      type: String
      value: "18020"
    - name: gradioPort
      type: String
      value: "17860"
  stages:
    - stage:
        name: RuntimePrefetchSmoke
        identifier: RuntimePrefetchSmoke
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  name: PrefetchHandwrittenRuntimeModel
                  identifier: PrefetchHandwrittenRuntimeModel
                  type: ShellScript
                  timeout: 30m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          set -euo pipefail

                          export HARNESS_API_TOKEN="<+secrets.getValue(\"HARNESS_API_TOKEN\")>"
                          export HARNESS_ACCOUNT_ID="<+account.identifier>"
                          export HARNESS_ORG_ID="<+org.identifier>"
                          export HARNESS_PROJECT_ID="<+project.identifier>"
                          export MSOCR_HTR_RUNTIME_HAR_REGISTRY="<+pipeline.variables.harRegistry>"
                          export MSOCR_HTR_RUNTIME_HAR_VERSION="<+pipeline.variables.harVersion>"
                          export MSOCR_HTR_RUNTIME_HAR_FILENAME="<+pipeline.variables.harFilename>"
                          export MSOCR_HTR_RUNTIME_LANG="syriac"
                          export MSOCR_HTR_RUNTIME_VARIANT="<+pipeline.variables.scriptVariant>"
                          export MSOCR_HTR_RUNTIME_HAR_CACHE_DIR="models/runtime/htr"

                          uv run python - <<'PY'
                          from msocr.service.runtime import prefetch_htr_runtime_model_from_env
                          path = prefetch_htr_runtime_model_from_env()
                          if path is None:
                              raise SystemExit("handwritten runtime prefetch did not resolve a model")
                          print(path)
                          PY
        delegateSelectors:
          - <+pipeline.variables.delegateSelector>
    - stage:
        name: DeployHandwrittenApiSmoke
        identifier: DeployHandwrittenApiSmoke
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  name: LaunchAndProbeHandwrittenApi
                  identifier: LaunchAndProbeHandwrittenApi
                  type: ShellScript
                  timeout: 45m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          set -euo pipefail

                          export HARNESS_API_TOKEN="<+secrets.getValue(\"HARNESS_API_TOKEN\")>"
                          export HARNESS_ACCOUNT_ID="<+account.identifier>"
                          export HARNESS_ORG_ID="<+org.identifier>"
                          export HARNESS_PROJECT_ID="<+project.identifier>"
                          export MSOCR_HTR_RUNTIME_HAR_REGISTRY="<+pipeline.variables.harRegistry>"
                          export MSOCR_HTR_RUNTIME_HAR_VERSION="<+pipeline.variables.harVersion>"
                          export MSOCR_HTR_RUNTIME_HAR_FILENAME="<+pipeline.variables.harFilename>"
                          export MSOCR_HTR_RUNTIME_LANG="syriac"
                          export MSOCR_HTR_RUNTIME_VARIANT="<+pipeline.variables.scriptVariant>"
                          export MSOCR_HTR_RUNTIME_HAR_CACHE_DIR="models/runtime/htr"
                          export MSOCR_RUNTIME_SMOKE_MODE="handwritten"
                          export MSOCR_RUNTIME_SMOKE_LANG="syriac"
                          export MSOCR_RUNTIME_SMOKE_VARIANT="<+pipeline.variables.scriptVariant>"
                          export MSOCR_RUNTIME_SMOKE_PROVIDER="auto"
                          export MSOCR_RUNTIME_SMOKE_IMAGE="<+pipeline.variables.htrSmokeImagePath>"

                          API_PORT="<+pipeline.variables.apiRuntimePort>"
                          LOG_DIR="output/pipelines/handwritten-runtime-smoke"
                          LOG_PATH="$LOG_DIR/api.log"

                          mkdir -p "$LOG_DIR"

                          uv run msocr api \
                            --host 127.0.0.1 \
                            --port "$API_PORT" \
                            >"$LOG_PATH" 2>&1 &
                          API_PID=$!

                          cleanup() {
                            if kill -0 "$API_PID" >/dev/null 2>&1; then
                              kill "$API_PID" >/dev/null 2>&1 || true
                              wait "$API_PID" >/dev/null 2>&1 || true
                            fi
                            test -f "$LOG_PATH" && tail -n 50 "$LOG_PATH" || true
                          }
                          trap cleanup EXIT

                          uv run msocr runtime-smoke-check \
                            --mode handwritten \
                            --lang syriac \
                            --variant "<+pipeline.variables.scriptVariant>" \
                            --provider auto \
                            --require-engine kraken \
                            --base-url "http://127.0.0.1:${API_PORT}" \
                            --image "<+pipeline.variables.htrSmokeImagePath>" \
                            --timeout 120 \
                            --poll-interval 3
        delegateSelectors:
          - <+pipeline.variables.delegateSelector>
    - stage:
        name: DeployGradioWebSmoke
        identifier: DeployGradioWebSmoke
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  name: LaunchAndProbeGradioWeb
                  identifier: LaunchAndProbeGradioWeb
                  type: ShellScript
                  timeout: 45m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          set -euo pipefail

                          export HARNESS_API_TOKEN="<+secrets.getValue(\"HARNESS_API_TOKEN\")>"
                          export HARNESS_ACCOUNT_ID="<+account.identifier>"
                          export HARNESS_ORG_ID="<+org.identifier>"
                          export HARNESS_PROJECT_ID="<+project.identifier>"
                          export MSOCR_HTR_RUNTIME_HAR_REGISTRY="<+pipeline.variables.harRegistry>"
                          export MSOCR_HTR_RUNTIME_HAR_VERSION="<+pipeline.variables.harVersion>"
                          export MSOCR_HTR_RUNTIME_HAR_FILENAME="<+pipeline.variables.harFilename>"
                          export MSOCR_HTR_RUNTIME_LANG="syriac"
                          export MSOCR_HTR_RUNTIME_VARIANT="<+pipeline.variables.scriptVariant>"
                          export MSOCR_HTR_RUNTIME_HAR_CACHE_DIR="models/runtime/htr"
                          export MSOCR_RUNTIME_SMOKE_MODE="handwritten"
                          export MSOCR_RUNTIME_SMOKE_LANG="syriac"
                          export MSOCR_RUNTIME_SMOKE_VARIANT="<+pipeline.variables.scriptVariant>"
                          export MSOCR_RUNTIME_SMOKE_PROVIDER="kraken"
                          export MSOCR_RUNTIME_SMOKE_IMAGE="<+pipeline.variables.htrSmokeImagePath>"

                          GRADIO_PORT="<+pipeline.variables.gradioPort>"
                          GRADIO_BASE_URL="http://127.0.0.1:${GRADIO_PORT}"
                          LOG_DIR="output/pipelines/handwritten-runtime-smoke"
                          LOG_PATH="$LOG_DIR/gradio.log"

                          mkdir -p "$LOG_DIR"

                          uv run msocr demo \
                            --host 127.0.0.1 \
                            --port "$GRADIO_PORT" \
                            >"$LOG_PATH" 2>&1 &
                          GRADIO_PID=$!

                          cleanup() {
                            if kill -0 "$GRADIO_PID" >/dev/null 2>&1; then
                              kill "$GRADIO_PID" >/dev/null 2>&1 || true
                              wait "$GRADIO_PID" >/dev/null 2>&1 || true
                            fi
                            test -f "$LOG_PATH" && tail -n 50 "$LOG_PATH" || true
                          }
                          trap cleanup EXIT

                          uv run python - <<'PY'
                          import json
                          import os
                          from msocr.service.deploy import gradio_http_smoke_check

                          payload = gradio_http_smoke_check(base_url=os.environ["GRADIO_BASE_URL"])
                          print(json.dumps(payload, ensure_ascii=False, indent=2))
                          PY
        delegateSelectors:
          - <+pipeline.variables.delegateSelector>
