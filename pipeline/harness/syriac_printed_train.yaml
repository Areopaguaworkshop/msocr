schema_version: msocr.docspec.v1
id: pipeline.harness.syriac_printed_train
title: Syriac Printed OCR Training Pipeline
purpose: |
  Define end-to-end CI/CD pipeline for Syriac printed OCR model training.
  Targets mixed corpus with Estrangela, Serto, and East Syriac variants.
  First automated pipeline per Section 7 of Summary-harness-update.md.
scope:
    project: msocr
    languages:
        - name: syriac
          status: implementation_priority_1
          variants:
              - estrangela
              - serto
              - east_syriac
    writing_modes:
        - printed
inputs:
    required:
        - target_language
        - script_variant
        - writing_mode
        - split_manifest_id
        - model_config_id
    optional:
        - desired_accuracy
        - gpu_tier
workflow:
    - step_id: TRG1
      name: trigger
      action: |
        Git push to data/syriac/** or data/annotation/** path filter,
        OR manual dispatch with language + variant parameters.
    - step_id: VAL1
      name: validate
      action: |
        Check annotation session export: line count >= 500, XML schema valid.
        Confirm frozen manifest exists in data/manifests/.
        Assert script_variant declared in session metadata.
    - step_id: BLD1
      name: build_training_image
      action: |
        Docker image: ubuntu:22.04 + Tesseract 5.x + tesstrain +
        tessdata_best/syr.traineddata (SHA-pinned).
        Push to HAR Docker registry.
    - step_id: RNP1
      name: runpod_submit
      action: |
        POST to RunPod API with image ref, GPU tier (RTX 4090 default),
        environment variables. Poll RunPod job status OR receive webhook
        callback on completion.
    - step_id: EVAL1
      name: evaluate
      action: |
        Run tesseract eval on frozen benchmark manifest.
        Write metrics.json with CER, WER, language, script_variant,
        model_version, pipeline_run_id, manifest_id.
    - step_id: GT1
      name: policy_gate
      action: |
        Read metrics.json. Apply per-variant CER threshold from Section 5:
        Estrangela <= 5%, Serto <= 10%, East Syriac <= 10%.
        PASS: continue to register step.
        FAIL: emit needs_manual_review: true, block deployment, notify.
    - step_id: REG1
      name: register_artifact
      action: |
        Push model file to HAR as generic artifact.
        Artifact name pattern: syr-{variant}-v{sequenceId}.
        Attach metrics.json as artifact sidecar.
        Tag: staging (automatic), production (manual approval gate).
    - step_id: DEP1
      name: deploy
      action: |
        Harness CD pulls model from HAR on FastAPI service startup.
        Gradio demo updated to point to new model tag.
metrics:
    primary:
        - CER
    secondary:
        - WER
thresholds:
    estrangela:
        cer_max: 0.05
    serto:
        cer_max: 0.10
    east_syriac:
        cer_max: 0.10
    rule: |
      Manual review if printed gate fails or confidence is unstable.
      Per-variant thresholds from Section 5 of Summary-harness-update.md:
      Estrangela <= 5%, Serto <= 10%, East Syriac <= 10%.
fallback:
    failed_or_unstable:
        - collect_additional_ground_truth_lines
        - retrain_with_adjusted_hyperparameters
        - separate_model_per_variant
        - set_needs_manual_review_true
outputs:
    artifacts:
        - trained_model
        - metrics.json
        - config.yaml
        - Dockerfile.sha
        - review_flag
integration:
    implemented_modules:
        - msocr/cli.py
        - msocr/data/manager.py
        - msocr/pipeline/runpod_client.py
        - msocr/pipeline/har_client.py
        - msocr/evaluation/metrics.py
        - msocr/data/manifest.py
    planned_modules:
        - annotation_api
        - session_manager
tooling:
    package_manager: uv
    runtime_execution: uv run
    code_location_policy: all_new_code_under_msocr
    gpu_tier: RTX 4090 (24 GB)
    training_corpus_size: 500-5000 lines
    baseline_model: Tesseract syr (tessdata_best)
    fine_tuning_checkpoint: tessdata_best/syr.traineddata
status:
    maturity: active_blueprint
    implementation_state: implementation_in_progress
owners:
    - role: syriac_printed_ocr
      team: msocr
last_updated: 2026-04-04
