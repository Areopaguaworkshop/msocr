schema_version: msocr.docspec.v1
id: pipeline.low_confidence_fallback
title: Low Confidence Fallback Pipeline
purpose: Define deterministic recovery behavior for unstable routing or weak model confidence.
scope:
  project: msocr
  languages:
    - name: sogdian
      status: active
    - name: old_turkish
      status: active
    - name: greek
      status: planned
    - name: latin
      status: planned
    - name: syriac
      status: planned
    - name: coptic
      status: planned
  writing_modes:
    - printed
    - handwritten
inputs:
  required:
    - target_language
    - writing_mode
    - confidence_signals
    - primary_model_output
  optional:
    - secondary_model_candidates
workflow:
  - step_id: F1
    name: detect_instability
    action: Confirm low confidence or model disagreement.
  - step_id: F2
    name: run_alternative_path
    action: Execute secondary profile or dual-model sampling.
  - step_id: F3
    name: compare_candidates
    action: Rank candidates by confidence, CER proxy, and language consistency.
  - step_id: F4
    name: emit_decision
    action: Select safest output or mark for manual review.
metrics:
  primary:
    - confidence_stability
  secondary:
    - language_consistency_score
thresholds:
  fallback:
    min_confidence: 0.80
    min_stability_margin: 0.05
  rule: If threshold is not met after fallback, manual review is mandatory.
fallback:
  unresolved_case:
    - keep_all_candidates
    - set_needs_manual_review_true
    - attach_reason_codes
outputs:
  artifacts:
    - selected_output
    - fallback_trace
    - needs_manual_review
    - reason_codes
integration:
  implemented_modules:
    - msocr/models/inference.py
  planned_modules:
    - confidence_aggregator
    - review_queue_connector
status:
  maturity: active_blueprint
  implementation_state: documentation_defined
owners:
  - role: reliability
    team: msocr
last_updated: 2026-02-12
