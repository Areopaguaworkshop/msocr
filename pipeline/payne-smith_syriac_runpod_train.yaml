project:
  name: payne-smith-syriac-ocr-unified
  version: 1.0
  description: >
    Unified end-to-end OCR training pipeline for the Payne Smith Syriac
    dictionary. Covers two sequential training stages, both executed on
    RunPod GPU infrastructure and orchestrated from a local machine:

      Stage 1 — Vienna Pretrain:
        Train a base Syriac OCR model on the Vienna 2024 handwritten
        ground truth dataset (CC BY 4.0).

      Stage 2 — Payne Smith Fine-tune:
        Fine-tune the Vienna-pretrained model on corrected Payne Smith
        dictionary lines, with dual-script support (Serto body text +
        Estrangelo headers), synthetic printed-font augmentation,
        and per-token mixed-script language correction.

  data_flow: |
    Local machine
      ├── Vienna GT (git clone)          ─rsync→  Network Volume /workspace/dataset/vienna
      ├── Payne Smith raw PDFs           ─rsync→  Network Volume /workspace/input
      └── Scripts / YAML config          ─rsync→  Network Volume /workspace/scripts
                                                          │
                                               RunPod GPU Pod
                                                  ├── Stage 1: kraken train (Vienna)
                                                  │     └── /workspace/models/pretrain/vienna_serto.mlmodel
                                                  ├── Stage 2a: preprocessing + segmentation
                                                  ├── Stage 2b: bootstrap OCR
                                                  ├── Stage 2c: kraken train (Payne Smith)
                                                  │     └── /workspace/models/finetune/paynesmith_vN.mlmodel
                                                  └── Stage 3: evaluation
                                                          │
                                            ←──rsync── Network Volume
    Local machine
      └── models/ logs/ exports/

# ─────────────────────────────────────────────
# FLASH vs PERSISTENT POD — DECISION RATIONALE
# ─────────────────────────────────────────────
runpod_mode_decision:

  verdict: persistent_pod_for_training

  rationale: >
    RunPod Flash (Serverless) is NOT recommended for Kraken training.
    RunPod explicitly advises that for tasks using the GPU at full blast
    for hours on end — such as model training — a persistent GPU Pod is
    preferable to Serverless. Kraken has no mid-epoch checkpoint resume,
    so any job interruption means restarting the training epoch from zero.
    Serverless cold starts (30-120s) also add overhead for iterative runs.

  serverless_limitations_for_training:
    - Execution timeout hard cap: 24 hours (jobs exit exactly at this mark)
    - No mid-epoch resume if job times out or is evicted
    - Cold start overhead per job: 30-120 seconds
    - Docker image required (extra build/push step per code change)
    - GPU availability limited to regions with Network Volume support
    - HTTP response timeout: 90s (runsync endpoint) — unusable for training

  where_serverless_is_appropriate:
    - Bootstrap OCR inference on individual lines (< 5 min per batch)
    - Evaluation on holdout set (< 15 min)
    - Language correction post-processing (CPU-bound, < 5 min)
    - Serving the trained model for production inference

  architecture_used_in_this_pipeline:
    training_phases:    persistent_pod   # ON_DEMAND, SSH + tmux
    inference_phases:   persistent_pod   # same pod, no cold start
    result_retrieval:   rsync_over_ssh
    local_orchestration: runpodctl_cli + shell scripts

# ─────────────────────────────────────────────
# LICENSES
# ─────────────────────────────────────────────
license:
  kraken: MIT
  escriptorium: MIT
  vienna_ground_truth: CC_BY_4.0
  scikit_image: BSD
  poppler_utils: GPL_2
  trdg: MIT

# ─────────────────────────────────────────────
# PREREQUISITES
# ─────────────────────────────────────────────
prerequisites:

  runpod_account:
    - Create account at https://runpod.io
    - Add billing credit ($20+ recommended for both training stages)
    - Generate API key: Settings → API Keys → Create (READ/WRITE)
    - Add SSH public key: Settings → SSH Keys → Add Public Key

  local_tools:
    - runpodctl >= 1.11.0
    - rsync
    - git + git-lfs
    - ssh (OpenSSH client)
    - uv (Python package manager)
    - SSH key pair: ~/.ssh/id_ed25519

  install_runpodctl:
    macos:  brew install runpod/runpodctl/runpodctl
    linux:  |
      curl -sL https://github.com/runpod/runpodctl/releases/latest/download/runpodctl-linux-amd64.tar.gz \
        | tar xz -C ~/.local/bin
    windows: |
      wget https://github.com/runpod/runpodctl/releases/latest/download/runpodctl-windows-amd64.exe \
        -O runpodctl.exe

  configure_runpodctl:
    command: runpodctl config --apiKey=YOUR_API_KEY

  verify:
    command: |
      runpodctl pod list
      runpodctl --version

# ─────────────────────────────────────────────
# INFRASTRUCTURE
# ─────────────────────────────────────────────
infrastructure:

  network_volume:
    name: syriac-ocr-vol
    size_gb: 100
    region: EUR-IS-1
    mount_path: /workspace

    size_rationale:
      vienna_gt_images_and_xml: ~1 GB
      payne_smith_raw_pages_png: ~5 GB
      payne_smith_processed_lines: ~3 GB
      synthetic_augmentation_data: ~2 GB
      model_checkpoints_all_stages: ~10 GB
      logs_and_exports: ~2 GB
      venv_and_packages: ~8 GB
      buffer: ~69 GB
      total: 100 GB

    creation:
      dashboard_steps:
        - Login → Storage → New Network Volume
        - Name: syriac-ocr-vol
        - Region: EUR-IS-1
        - Size: 100 GB
        - Click Create
      cli: >
        # Network volume creation is dashboard-only.
        # After creation, note the volume ID from the Storage page.

    directory_layout: |
      /workspace/
        dataset/
          vienna/            # Stage 1: Vienna 2024 GT (git cloned)
          pretrain/          # Stage 1: train/val/holdout splits of Vienna
          raw_pages/         # Stage 2: Payne Smith raw PNG pages
          processed_pages/   # Stage 2: preprocessed (deskewed, binarized) pages
          lines/             # Stage 2: extracted line images + baselines
          synthetic_lines/   # Stage 2: TRDG synthetic printed-Serto lines
          bootstrap/         # Stage 2: high-confidence bootstrap predictions
          rejected/          # Stage 2: low-confidence lines for manual review
          corrected/         # Stage 2: manually corrected lines from eScriptorium
          train/
            serto/           # Stage 2 training split — Serto body lines
            estrangela/      # Stage 2 training split — Estrangelo header lines
          validation/
            serto/
            estrangela/
          holdout/           # Frozen holdout — never used for tuning
          split_manifests/   # JSON manifests for reproducibility
        models/
          pretrain/          # Output of Stage 1
          finetune/          # Output of Stage 2
        input/               # Raw Payne Smith PDF(s)
        scripts/             # Python scripts synced from local
        logs/                # All training logs
        exports/             # Final models + PAGE XML + JSONL outputs
        .venv/               # Python virtual environment (persists on volume)

    cost_estimate:
      storage_per_month: ~$7/month for 100 GB

  gpu_pod:
    name: syriac-ocr-trainer
    compute_type: ON_DEMAND
    docker_image: runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel-ubuntu22.04

    note: >
      CUDA 11.x is required for Kraken. Do not use CUDA 12.x images
      without verifying Kraken and PyTorch compatibility first.

    recommended_gpu:
      primary:
        gpu: RTX A5000
        vram_gb: 24
        approx_per_hr: $0.52
        note: Best price/performance balance for multi-hour Kraken training.
      budget:
        gpu: RTX 3090
        vram_gb: 24
        approx_per_hr: $0.44
        note: Marginally slower; good for longer cost-sensitive runs.
      fast:
        gpu: A100 SXM 80GB
        vram_gb: 80
        approx_per_hr: $2.09
        note: Fastest iteration; use only if time is the constraint.

    gpu_fallback_order:
      - NVIDIA_RTX_A5000
      - NVIDIA_RTX_3090
      - NVIDIA_A40
    # Selecting multiple GPU types prevents queuing if primary is unavailable.

    network_volume: syriac-ocr-vol
    mount_path: /workspace
    exposed_ports:
      - 22     # SSH
      - 8888   # JupyterLab (optional monitoring)
    container_disk_gb: 30

    creation_cli:
      command: |
        runpodctl pod create \
          --image runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel-ubuntu22.04 \
          --gpu-id NVIDIA_RTX_A5000 \
          --name syriac-ocr-trainer \
          --ssh \
          --volume-id YOUR_VOLUME_ID \
          --volume-mount /workspace \
          --disk 30

    get_connection_details:
      command: |
        runpodctl pod list --output table
        runpodctl pod get YOUR_POD_ID
        # Note: publicIp and tcpPort22

    ssh_command: |
      ssh root@PUBLIC_IP -p TCP_PORT -i ~/.ssh/id_ed25519

# ─────────────────────────────────────────────
# GLOBAL CONFIGURATION
# ─────────────────────────────────────────────
configuration:

  random_seed: 42      # Canonical seed — referenced by all phases using randomness

  dpi: 500
  line_height: 48

  preprocessing:
    deskew: true
    denoise: true
    binarization: sauvola
    sauvola_window: 31
    sauvola_k: 0.15
    background_normalization: true

  segmentation:
    model: blla
    reading_order: rtl
    min_confidence: 0.50
    region_types:
      - MainZone      # Serto body text
      - TitleZone     # Estrangelo headers
      - MarginZone    # Marginal glosses

  bootstrap:
    confidence_aggregation: mean     # mean | min | p10
    confidence_threshold: 0.80

  language_correction:
    symspell_max_edit_distance: 1
    # Start at 1 for Syriac — short consonantal roots make edit_distance=2
    # aggressive. Measure false-correction rate before increasing.

  dataset:
    vienna_train_ratio: 0.85
    vienna_validation_ratio: 0.10
    vienna_holdout_ratio: 0.05
    paynesmith_training_lines: 500
    paynesmith_validation_ratio: 0.10
    paynesmith_holdout_ratio: 0.05
    active_learning_ratio: 0.40

# ─────────────────────────────────────────────
# ONE-TIME POD SETUP
# ─────────────────────────────────────────────
pod_setup:

  run_on: pod_ssh
  run_once: true
  note: >
    Run these commands once after the pod is created.
    The venv is stored on /workspace so it persists across pod restarts.
    Container disk (/root, /tmp) resets on restart — /workspace does not.

  steps:

    - name: verify_gpu_and_cuda
      command: |
        nvidia-smi
        python -c "import torch; print('CUDA:', torch.cuda.is_available()); \
                   print('GPU:', torch.cuda.get_device_name(0)); \
                   print('PyTorch:', torch.__version__)"

    - name: install_system_packages
      command: |
        apt-get update && apt-get install -y \
          git git-lfs poppler-utils imagemagick tmux rsync curl
        git lfs install

    - name: install_uv
      command: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        source ~/.bashrc

    - name: create_venv_on_workspace
      command: |
        cd /workspace
        uv venv --python 3.10
        source .venv/bin/activate

    - name: install_python_packages
      command: |
        source /workspace/.venv/bin/activate
        uv pip install \
          kraken numpy opencv-python pillow tqdm pandas \
          scikit-image scikit-learn editdistance symspellpy \
          lxml pyyaml orjson rich trdg
        kraken --version
        python -c "import torch; print('GPU available:', torch.cuda.is_available())"

    - name: create_directory_structure
      command: |
        mkdir -p /workspace/dataset/{vienna,pretrain/{train,validation,holdout}}
        mkdir -p /workspace/dataset/{raw_pages,processed_pages,lines}
        mkdir -p /workspace/dataset/{synthetic_lines,bootstrap,rejected,corrected}
        mkdir -p /workspace/dataset/{train/{serto,estrangela},validation/{serto,estrangela},holdout}
        mkdir -p /workspace/dataset/split_manifests
        mkdir -p /workspace/models/{pretrain,finetune}
        mkdir -p /workspace/{input,scripts,logs,exports}

    - name: convenience_aliases
      command: |
        echo 'alias activate="source /workspace/.venv/bin/activate"' >> ~/.bashrc
        echo 'alias gpu="nvidia-smi"' >> ~/.bashrc
        source ~/.bashrc

# ─────────────────────────────────────────────
# LOCAL SETUP
# ─────────────────────────────────────────────
local_setup:

  steps:

    - name: create_local_project
      run_on: local
      command: |
        uv init payne-smith-ocr && cd payne-smith-ocr
        uv python install 3.11
        uv venv && source .venv/bin/activate
        uv add kraken numpy opencv-python pillow tqdm pandas \
               scikit-image scikit-learn editdistance symspellpy \
               lxml pyyaml orjson rich trdg
        uv lock

    - name: clone_vienna_ground_truth
      run_on: local
      command: |
        git lfs install
        git clone https://github.com/HTR-School-Vienna/2024--Syriac.git \
          dataset/vienna

# ─────────────────────────────────────────────
# DATA TRANSFER: LOCAL → NETWORK VOLUME
# ─────────────────────────────────────────────
data_transfer:

  note: >
    All transfers go via rsync over SSH to the Network Volume.
    Transfers only need to be done once — data persists on the volume.

  get_pod_ssh_details:
    command: |
      runpodctl pod get YOUR_POD_ID
      # Note: publicIp → PUBLIC_IP, tcpPort22 → TCP_PORT

  transfer_vienna_gt:
    run_on: local
    command: |
      rsync -avzP --progress \
        -e "ssh -p TCP_PORT -i ~/.ssh/id_ed25519" \
        dataset/vienna/ \
        root@PUBLIC_IP:/workspace/dataset/vienna/

  transfer_payne_smith_pdfs:
    run_on: local
    command: |
      rsync -avzP \
        -e "ssh -p TCP_PORT -i ~/.ssh/id_ed25519" \
        input/ \
        root@PUBLIC_IP:/workspace/input/

  transfer_scripts:
    run_on: local
    command: |
      rsync -avzP \
        -e "ssh -p TCP_PORT -i ~/.ssh/id_ed25519" \
        scripts/ \
        root@PUBLIC_IP:/workspace/scripts/

  verify_transfer:
    run_on: pod_ssh
    command: |
      echo "Vienna XML files: $(find /workspace/dataset/vienna -name '*.xml' | wc -l)"
      echo "Vienna images:    $(find /workspace/dataset/vienna -name '*.png' | wc -l)"
      du -sh /workspace/dataset/vienna/

# ═════════════════════════════════════════════════════════════════
# STAGE 1 — VIENNA PRETRAIN
# ═════════════════════════════════════════════════════════════════
stage_1_vienna_pretrain:

  description: >
    Train a base Syriac HTR model using the Vienna 2024 handwritten Serto
    manuscript ground truth. Produces vienna_serto.mlmodel which becomes
    the starting point for Stage 2 Payne Smith fine-tuning.

  note: >
    The Vienna GT is a 16th-century manuscript. The Payne Smith dictionary
    is a 1903 Oxford printed typeface. These are different visual domains.
    Stage 2 synthetic augmentation (phase_2b) bridges this gap.

  phase_1a_validate_vienna_gt:

    run_on: pod_ssh
    command: |
      source /workspace/.venv/bin/activate
      python - <<'EOF'
      import glob
      from pathlib import Path

      xml_files = glob.glob("/workspace/dataset/vienna/**/*.xml", recursive=True)
      print(f"Total GT files: {len(xml_files)}")

      missing_images = []
      for xml in xml_files:
          p = Path(xml)
          if not any(p.with_suffix(e).exists() for e in [".png", ".jpg", ".tif"]):
              missing_images.append(xml)

      if missing_images:
          print(f"WARNING: {len(missing_images)} XML files have no matching image")
          for f in missing_images[:5]: print(f"  {f}")
      else:
          print("All XML files have matching images.")
      EOF

  phase_1b_split_vienna_dataset:

    run_on: pod_ssh
    command: |
      source /workspace/.venv/bin/activate
      python - <<'EOF'
      import glob, random, shutil, json
      from pathlib import Path

      SEED = 42
      random.seed(SEED)

      xml_files = sorted(glob.glob("/workspace/dataset/vienna/**/*.xml", recursive=True))
      random.shuffle(xml_files)

      n = len(xml_files)
      n_holdout    = max(1, int(n * 0.05))
      n_validation = max(1, int(n * 0.10))
      n_train      = n - n_holdout - n_validation

      splits = {
          "holdout":    xml_files[:n_holdout],
          "validation": xml_files[n_holdout:n_holdout + n_validation],
          "train":      xml_files[n_holdout + n_validation:],
      }

      print(f"Vienna split (seed={SEED}): total={n}, "
            f"train={len(splits['train'])}, "
            f"val={len(splits['validation'])}, "
            f"holdout={len(splits['holdout'])} [frozen]")

      def copy_split(files, dest_dir):
          dest = Path(dest_dir)
          dest.mkdir(parents=True, exist_ok=True)
          for xml in files:
              p = Path(xml)
              shutil.copy2(xml, dest / p.name)
              for ext in [".png", ".jpg", ".tif"]:
                  img = p.with_suffix(ext)
                  if img.exists():
                      shutil.copy2(img, dest / img.name)
                      break

      for split_name, files in splits.items():
          copy_split(files, f"/workspace/dataset/pretrain/{split_name}")

      manifest = {
          "stage": "vienna_pretrain",
          "seed": SEED,
          "total": n,
          "splits": {k: [str(Path(f).name) for f in v] for k, v in splits.items()},
      }
      with open("/workspace/dataset/split_manifests/vienna_split.json", "w") as f:
          json.dump(manifest, f, indent=2)
      print("Manifest saved: /workspace/dataset/split_manifests/vienna_split.json")
      EOF

  phase_1c_pretrain:

    run_on: pod_ssh
    use_tmux: true
    tmux_session: vienna_pretrain

    pre_flight:
      command: |
        source /workspace/.venv/bin/activate
        nvidia-smi
        kraken --version >> /workspace/logs/versions.txt
        python -c "import torch; print(torch.__version__)" >> /workspace/logs/versions.txt
        echo "Train files:      $(ls /workspace/dataset/pretrain/train/*.xml | wc -l)"
        echo "Validation files: $(ls /workspace/dataset/pretrain/validation/*.xml | wc -l)"

    command: |
      source /workspace/.venv/bin/activate
      tmux new -s vienna_pretrain

      kraken \
        -d cuda:0 \
        train \
          --ground-truth /workspace/dataset/pretrain/train/*.xml \
          --evaluation-files /workspace/dataset/pretrain/validation/*.xml \
          --output /workspace/models/pretrain/vienna_serto \
          --resize add \
          --text-direction rtl \
          --augment \
          --lag 10 \
          --min-epochs 20 \
          --max-epochs 100 \
          --batch-size 16 \
          --workers 4 \
        2>&1 | tee /workspace/logs/vienna_pretrain_$(date +%Y%m%d_%H%M%S).log

    flags_explained:
      -d cuda:0:         Use GPU. CRITICAL — omitting this silently uses CPU.
      --resize add:      Expand codec to handle characters not in pretrain vocab.
      --lag 10:          Early stopping — halt if no improvement for 10 epochs.
      --min-epochs 20:   Train at least 20 epochs before early stopping triggers.
      --max-epochs 100:  Hard cap to prevent runaway cost.
      --batch-size 16:   Reduce to 8 if OOM errors occur.
      --workers 4:       Parallel data loading — tune to pod vCPU count.
      --augment:         Random augmentation (rotation, noise, distortion).

    output:
      model: /workspace/models/pretrain/vienna_serto.mlmodel
      logs:  /workspace/logs/vienna_pretrain_*.log

    monitoring:
      watch_log: |
        # Second tmux pane (Ctrl+B then "):
        tail -f /workspace/logs/vienna_pretrain_*.log | grep -E "(epoch|cer|loss|val)"
      watch_gpu: |
        watch -n 5 nvidia-smi

    expected_cer: 10-15%
    expected_duration: 1-4 hours

  phase_1d_evaluate_vienna:

    run_on: pod_ssh
    depends_on: phase_1c_pretrain

    command: |
      source /workspace/.venv/bin/activate
      kraken \
        -d cuda:0 \
        test \
          --model /workspace/models/pretrain/vienna_serto.mlmodel \
          --evaluation-files /workspace/dataset/pretrain/holdout/*.xml \
          --text-direction rtl \
        2>&1 | tee /workspace/logs/vienna_eval_$(date +%Y%m%d_%H%M%S).log

    note: >
      Record CER/WER from this evaluation as the Vienna baseline.
      This is the reference point before any Payne Smith fine-tuning.

    metrics:
      - cer
      - wer
      - accuracy

# ═════════════════════════════════════════════════════════════════
# STAGE 2 — PAYNE SMITH FINE-TUNE
# ═════════════════════════════════════════════════════════════════
stage_2_payne_smith_finetune:

  description: >
    Fine-tune the Vienna-pretrained model on corrected Payne Smith
    dictionary lines. Handles dual-script pages (Serto body + Estrangelo
    headers), generates synthetic printed-font lines to bridge the
    manuscript-to-print domain gap, and applies per-token mixed-script
    language correction.

  depends_on: stage_1_vienna_pretrain
  model_check: |
    [ -f /workspace/models/pretrain/vienna_serto.mlmodel ] || \
      { echo "ERROR: vienna_serto.mlmodel not found. Complete Stage 1 first."; exit 1; }

  # ─── Phase 2a: Ingest Payne Smith Pages ───────────────────────
  phase_2a_ingest_pages:

    run_on: pod_ssh

    steps:
      - name: pdf_to_tiff
        command: |
          source /workspace/.venv/bin/activate
          pdftoppm -tiff -r 500 /workspace/input/payne_smith.pdf \
            /workspace/dataset/raw_pages/page

      - name: tiff_to_png
        # Explicit -depth 8 prevents silent downconversion of 16-bit TIFFs
        command: |
          for f in /workspace/dataset/raw_pages/*.tif; do
            convert "$f" -depth 8 -compress none "${f%.tif}.png"
            rm "$f"
          done
          echo "Converted: $(ls /workspace/dataset/raw_pages/*.png | wc -l) pages"

  # ─── Phase 2b: Synthetic Printed-Serto Augmentation ──────────
  phase_2b_synthetic_augmentation:

    run_on: pod_ssh
    description: >
      Generate synthetic printed Syriac lines using Unicode fonts to bridge
      the manuscript-to-print domain gap. Produces paired (image, XML) data
      in Kraken-compatible format. Run before manual annotation begins.

    install_syriac_fonts:
      command: |
        apt-get install -y fonts-syriac
        # Verify fonts are available:
        fc-list | grep -i "syriac\|estrangelo\|serto"

    command: |
      source /workspace/.venv/bin/activate
      python /workspace/scripts/generate_synthetic.py \
        --output-dir /workspace/dataset/synthetic_lines \
        --count 2000 \
        --fonts "Estrangelo Edessa,Serto Jerusalem,East Syriac Adiabene" \
        --seed 42 \
        --augment

    generate_synthetic_script:
      path: /workspace/scripts/generate_synthetic.py
      description: >
        Uses TRDG to render text lines from a Syriac word list (sourced from
        the Dukhrana Payne Smith lexicon at dukhrana.com/lexicon/PayneSmith/
        or the Vienna GT word list), then saves images + Kraken XML ground
        truth pairs to the output directory.
      augmentations:
        - gaussian_noise
        - slight_blur
        - random_rotation_deg: [-1, 1]
        - ink_bleed_simulation
        - random_dilation

    output: /workspace/dataset/synthetic_lines/
    line_count: 2000
    random_seed: 42

  # ─── Phase 2c: Preprocessing ──────────────────────────────────
  phase_2c_preprocess:

    run_on: pod_ssh
    command: |
      source /workspace/.venv/bin/activate
      python /workspace/scripts/preprocess.py \
        --input-dir /workspace/dataset/raw_pages \
        --output-dir /workspace/dataset/processed_pages \
        --deskew \
        --denoise nlm \
        --binarize sauvola \
        --sauvola-window 31 \
        --sauvola-k 0.15

    pseudocode: |
      for page in raw_pages:
          img = load(page)
          if deskew: img = deskew(img)
          if denoise: img = nlm_denoise(img)
          thresh = sauvola_threshold(img, window=31, k=0.15)
          binary = img > thresh
          save(binary, processed_pages)

  # ─── Phase 2d: Segmentation ───────────────────────────────────
  phase_2d_segmentation:

    run_on: pod_ssh
    description: >
      Line segmentation + region classification using Kraken BLLA.
      Tags zones as MainZone (Serto body) or TitleZone (Estrangelo headers).

    command: |
      source /workspace/.venv/bin/activate
      for page in /workspace/dataset/processed_pages/*.png; do
        base=$(basename "$page" .png)
        kraken -i "$page" "/workspace/dataset/lines/${base}_lines.json" \
          segment \
            --model blla \
            --reading-order-model blla \
            --text-direction rtl
      done

    region_routing:
      MainZone:   serto       # body dictionary text → Serto model
      TitleZone:  estrangela  # letter headers → Estrangelo model
      MarginZone: serto       # marginal glosses → Serto model

  # ─── Phase 2e: Line Extraction ────────────────────────────────
  phase_2e_line_extraction:

    run_on: pod_ssh
    output: /workspace/dataset/lines/
    naming: six_digit_zero_padded
    save_baselines: true

  # ─── Phase 2f: Bootstrap OCR ──────────────────────────────────
  phase_2f_bootstrap_ocr:

    run_on: pod_ssh
    description: >
      Apply the Vienna-pretrained model to generate initial OCR hypotheses
      for Payne Smith lines. High-confidence predictions go to dataset/bootstrap
      for review; low-confidence to dataset/rejected for priority correction.

    depends_on: stage_1_vienna_pretrain
    model_check: |
      [ -f /workspace/models/pretrain/vienna_serto.mlmodel ] || \
        { echo "ERROR: Run Stage 1 first."; exit 1; }

    command: |
      source /workspace/.venv/bin/activate
      for line in /workspace/dataset/lines/*.png; do
        base=$(basename "$line" .png)
        kraken -d cuda:0 \
          -i "$line" "/workspace/dataset/lines/${base}_ocr.json" \
          ocr \
            -m /workspace/models/pretrain/vienna_serto.mlmodel
      done

    filtering:
      confidence_aggregation: mean
      threshold: 0.80
      above_threshold: /workspace/dataset/bootstrap/
      below_threshold: /workspace/dataset/rejected/

    post_filtering_script: |
      python /workspace/scripts/filter_bootstrap.py \
        --input-dir /workspace/dataset/lines \
        --bootstrap-dir /workspace/dataset/bootstrap \
        --rejected-dir /workspace/dataset/rejected \
        --threshold 0.80 \
        --aggregation mean

  # ─── Phase 2g: Manual Correction (eScriptorium) ───────────────
  phase_2g_manual_correction:

    run_on: local
    tool: escriptorium

    install:
      command: |
        git clone --branch v0.13.3 \
          https://gitlab.com/scripta/escriptorium.git
        cd escriptorium && docker-compose up -d

    workflow:
      - Import line images and bootstrap text into eScriptorium
      - Correct rejected predictions first (highest error rate)
      - Then correct low-confidence bootstrap predictions
      - Export corrected lines as PAGE XML
      - rsync corrected XML back to network volume:
          command: |
            rsync -avzP \
              -e "ssh -p TCP_PORT -i ~/.ssh/id_ed25519" \
              ./corrected_export/ \
              root@PUBLIC_IP:/workspace/dataset/corrected/

    target: 500 corrected lines minimum before first fine-tuning run

  # ─── Phase 2h: Dataset Split ──────────────────────────────────
  phase_2h_dataset_split:

    run_on: pod_ssh
    command: |
      source /workspace/.venv/bin/activate
      python /workspace/scripts/split_paynesmith.py \
        --corrected-dir /workspace/dataset/corrected \
        --train-serto /workspace/dataset/train/serto \
        --train-estrangela /workspace/dataset/train/estrangela \
        --validation-serto /workspace/dataset/validation/serto \
        --validation-estrangela /workspace/dataset/validation/estrangela \
        --holdout /workspace/dataset/holdout \
        --seed 42 \
        --manifest /workspace/dataset/split_manifests/paynesmith_split.json

    algorithm:
      random_sample_ratio: 0.60
      uncertainty_sample_ratio: 0.40
      uncertainty_metric: lowest_bootstrap_confidence

    split:
      train: 0.85
      validation: 0.10
      holdout:
        ratio: 0.05
        frozen: true
        note: >
          Frozen permanently after first split. Never add holdout lines
          to train or validation. Evaluate holdout only at v1, v2, v3
          model boundaries. Do not use holdout CER to guide hyperparameter
          choices.

  # ─── Phase 2i: Fine-tune Serto Model ──────────────────────────
  phase_2i_finetune_serto:

    run_on: pod_ssh
    use_tmux: true
    tmux_session: finetune_serto
    depends_on: phase_2h_dataset_split

    command: |
      source /workspace/.venv/bin/activate
      tmux new -s finetune_serto

      kraken \
        -d cuda:0 \
        train \
          --model /workspace/models/pretrain/vienna_serto.mlmodel \
          --ground-truth \
            /workspace/dataset/train/serto/*.xml \
            /workspace/dataset/synthetic_lines/*.xml \
          --evaluation-files /workspace/dataset/validation/serto/*.xml \
          --output /workspace/models/finetune/paynesmith_serto \
          --resize add \
          --text-direction rtl \
          --augment \
          --freeze-base 2 \
          --lag 10 \
          --min-epochs 15 \
          --max-epochs 80 \
          --batch-size 16 \
          --workers 4 \
        2>&1 | tee /workspace/logs/finetune_serto_$(date +%Y%m%d_%H%M%S).log

    freeze_base_note: >
      --freeze-base 2 is a starting point for print-domain adaptation.
      After first run, experiment with --freeze-base 0 (full unfreeze)
      if validation CER does not improve. Log and compare results.

    output: /workspace/models/finetune/paynesmith_serto_v1.mlmodel
    expected_cer_at_500_lines: ~5%
    expected_duration: 1-3 hours

  # ─── Phase 2j: Fine-tune Estrangelo Model ─────────────────────
  phase_2j_finetune_estrangela:

    run_on: pod_ssh
    use_tmux: true
    tmux_session: finetune_estrangela
    depends_on: phase_2h_dataset_split

    note: >
      TitleZone (Estrangelo) lines are far fewer than body lines.
      If fewer than 50 Estrangelo lines are available, skip this phase
      and use the Vienna base model as fallback for TitleZone lines.
      Set fallback threshold: min_estrangela_lines = 50.

    command: |
      source /workspace/.venv/bin/activate

      ESTRANGELA_COUNT=$(ls /workspace/dataset/train/estrangela/*.xml 2>/dev/null | wc -l)
      if [ "$ESTRANGELA_COUNT" -lt 50 ]; then
        echo "Only $ESTRANGELA_COUNT Estrangelo lines — using Vienna base model as fallback."
        cp /workspace/models/pretrain/vienna_serto.mlmodel \
           /workspace/models/finetune/paynesmith_estrangela_v1.mlmodel
        exit 0
      fi

      tmux new -s finetune_estrangela

      kraken \
        -d cuda:0 \
        train \
          --model /workspace/models/pretrain/vienna_serto.mlmodel \
          --ground-truth /workspace/dataset/train/estrangela/*.xml \
          --evaluation-files /workspace/dataset/validation/estrangela/*.xml \
          --output /workspace/models/finetune/paynesmith_estrangela \
          --resize add \
          --text-direction rtl \
          --augment \
          --freeze-base 2 \
          --lag 10 \
          --min-epochs 10 \
          --max-epochs 60 \
          --batch-size 8 \
          --workers 4 \
        2>&1 | tee /workspace/logs/finetune_estrangela_$(date +%Y%m%d_%H%M%S).log

    output: /workspace/models/finetune/paynesmith_estrangela_v1.mlmodel

  # ─── Phase 2k: Incremental Training ──────────────────────────
  phase_2k_incremental_training:

    enabled: true
    description: >
      After each batch of manually corrected annotations, retrain from
      the previous model checkpoint. Re-run bootstrap OCR on rejected
      lines with the updated model to reduce the correction backlog.

    command: |
      source /workspace/.venv/bin/activate
      tmux new -s incremental_N

      kraken \
        -d cuda:0 \
        train \
          --model /workspace/models/finetune/paynesmith_serto_vPREV.mlmodel \
          --ground-truth /workspace/dataset/train/serto/*.xml \
          --evaluation-files /workspace/dataset/validation/serto/*.xml \
          --output /workspace/models/finetune/paynesmith_serto \
          --resize add \
          --text-direction rtl \
          --augment \
          --lag 10 \
        2>&1 | tee /workspace/logs/incremental_$(date +%Y%m%d_%H%M%S).log

    post_training: |
      # Re-OCR the rejected set with the updated model
      for line in /workspace/dataset/rejected/*.png; do
        kraken -d cuda:0 \
          -i "$line" "${line%.png}_reocr.json" \
          ocr -m /workspace/models/finetune/paynesmith_serto_vN.mlmodel
      done

  # ─── Phase 2l: Language Correction ───────────────────────────
  phase_2l_language_correction:

    run_on: pod_ssh
    description: >
      Per-token script detection + symspell correction.
      Mixed-script lines (Syriac entry + Latin gloss on the same line)
      are tokenized first; each token is corrected against the appropriate
      language lexicon. Never apply Syriac correction to Latin tokens
      or vice versa.

    command: |
      source /workspace/.venv/bin/activate
      python /workspace/scripts/language_correction.py \
        --input-dir /workspace/exports/raw_ocr \
        --output-dir /workspace/exports/corrected_ocr \
        --syriac-lexicon /workspace/scripts/lexicons/sedra.txt \
        --latin-lexicon /workspace/scripts/lexicons/latin_en.txt \
        --max-edit-distance 1 \
        --syriac-range 0x0700 0x074F \
        --latin-range 0x0041 0x007A

    algorithm:
      tokenize_first: true
      per_token_script_detection:
        method: unicode_range_lookup
      correction_routing:
        syriac_tokens:
          method: symspell
          max_edit_distance: 1
          lexicon: sedra_dictionary + syriac_wordlist + dukhrana_payne_smith
        latin_tokens:
          method: symspell
          max_edit_distance: 1
          lexicon: latin_english_wordlist

# ═════════════════════════════════════════════════════════════════
# STAGE 3 — EVALUATION
# ═════════════════════════════════════════════════════════════════
stage_3_evaluation:

  run_on: pod_ssh

  command: |
    source /workspace/.venv/bin/activate
    kraken \
      -d cuda:0 \
      test \
        --model /workspace/models/finetune/paynesmith_serto_vN.mlmodel \
        --evaluation-files /workspace/dataset/holdout/*.xml \
        --text-direction rtl \
      2>&1 | tee /workspace/logs/eval_finetune_$(date +%Y%m%d_%H%M%S).log

  metrics:
    - cer                  # overall character error rate
    - wer                  # overall word error rate
    - syriac_cer           # CER on Syriac-only tokens
    - latin_cer            # CER on Latin-only tokens
    - mixed_line_cer       # CER on lines containing both scripts
    - word_accuracy
    - headword_accuracy    # accuracy on headword tokens (highest-value)

  expected_results:
    with_500_corrected_lines:   CER ~5%
    with_1000_corrected_lines:  CER ~2-3%
    with_2000_corrected_lines:  CER <2%
    note: >
      Targets assume successful domain adaptation via phase_2b synthetic
      augmentation. Without it, expected CER at 500 lines may be 8-12%.
      Track Serto and Estrangelo CER separately once enough GT exists.

# ═════════════════════════════════════════════════════════════════
# RESULT RETRIEVAL: NETWORK VOLUME → LOCAL
# ═════════════════════════════════════════════════════════════════
result_retrieval:

  run_on: local

  pull_models:
    command: |
      rsync -avzP \
        -e "ssh -p TCP_PORT -i ~/.ssh/id_ed25519" \
        root@PUBLIC_IP:/workspace/models/ \
        ./models/

  pull_logs:
    command: |
      rsync -avzP \
        -e "ssh -p TCP_PORT -i ~/.ssh/id_ed25519" \
        root@PUBLIC_IP:/workspace/logs/ \
        ./logs/

  pull_exports:
    command: |
      rsync -avzP \
        -e "ssh -p TCP_PORT -i ~/.ssh/id_ed25519" \
        root@PUBLIC_IP:/workspace/exports/ \
        ./exports/

  pull_split_manifests:
    command: |
      rsync -avzP \
        -e "ssh -p TCP_PORT -i ~/.ssh/id_ed25519" \
        root@PUBLIC_IP:/workspace/dataset/split_manifests/ \
        ./dataset/split_manifests/

  alternative_runpodctl:
    pod_command: |
      runpodctl send /workspace/models/finetune/paynesmith_serto_v1.mlmodel
    local_command: |
      runpodctl receive XXXX-word-word-word

# ═════════════════════════════════════════════════════════════════
# POD LIFECYCLE
# ═════════════════════════════════════════════════════════════════
pod_lifecycle:

  critical_rule: >
    STOP the pod immediately when no training is actively running.
    GPU compute is billed by the minute while the pod is RUNNING.
    The Network Volume persists safely at ~$7/month regardless.

  stop_pod:
    cli:       runpodctl pod stop YOUR_POD_ID
    dashboard: Pods → Your Pod → Stop

  restart_pod:
    cli: runpodctl pod start YOUR_POD_ID
    note: >
      On restart, /workspace remounts automatically. Models, datasets,
      logs all preserved. The .venv on /workspace is immediately usable.
      Run: source /workspace/.venv/bin/activate

  get_new_connection_details_after_restart:
    command: |
      runpodctl pod get YOUR_POD_ID
      # Public IP and port change on every restart

  resume_interrupted_training:
    note: >
      Kraken does not auto-resume from mid-epoch. Use --load to restart
      from the last saved .mlmodel checkpoint.
    command: |
      kraken -d cuda:0 train \
        --load /workspace/models/finetune/paynesmith_serto_vLAST.mlmodel \
        --ground-truth /workspace/dataset/train/serto/*.xml \
        [... other flags ...]

  delete_pod_when_done:
    cli:       runpodctl pod delete YOUR_POD_ID
    dashboard: Pods → Your Pod → Terminate
    note: >
      Deleting the pod does not delete the Network Volume.
      Always pull final models locally before deleting.

# ═════════════════════════════════════════════════════════════════
# COST ESTIMATES
# ═════════════════════════════════════════════════════════════════
cost_estimates:

  network_volume_100gb:
    rate: ~$0.07/GB/month
    monthly: ~$7.00/month

  stage_1_vienna_pretrain:
    gpu: RTX A5000 @ $0.52/hr
    estimated_duration: 2-4 hours
    estimated_cost: $1.04 - $2.08

  stage_2_payne_smith_finetune:
    gpu: RTX A5000 @ $0.52/hr
    preprocessing_and_segmentation: ~1 hour → ~$0.52
    serto_finetune: ~1-3 hours → $0.52 - $1.56
    estrangela_finetune: ~0.5-1 hour → $0.26 - $0.52
    per_incremental_run: ~1-2 hours → $0.52 - $1.04

  total_initial_run:
    training_only: $2.34 - $4.68
    storage_first_month: $7.00
    total_first_month: ~$9.34 - $11.68

  cost_saving_rules:
    - Stop pod the moment training finishes.
    - Use tmux to prevent orphaned compute (connection drop != pod stop).
    - Use RTX 3090 ($0.44/hr) over A5000 if time flexibility permits.
    - Run preprocessing and segmentation in one uninterrupted session.
    - Download all models locally before pod deletion.

# ═════════════════════════════════════════════════════════════════
# REPRODUCIBILITY
# ═════════════════════════════════════════════════════════════════
reproducibility:

  random_seed: 42

  record_after_each_run:
    command: |
      source /workspace/.venv/bin/activate
      {
        echo "=== $(date) ==="
        echo "Kraken: $(kraken --version)"
        python -c "import torch; print('PyTorch:', torch.__version__)"
        nvcc --version | grep release
        sha256sum /workspace/models/**/*.mlmodel
      } >> /workspace/logs/versions.txt

  commit_to_version_control:
    include:
      - dataset/split_manifests/vienna_split.json
      - dataset/split_manifests/paynesmith_split.json
      - uv.lock
      - logs/versions.txt
      - pipeline YAML (this file)
    exclude:
      - models/        # too large — archive via rsync separately
      - dataset/       # too large — preserved on Network Volume

  notes:
    - >
      The Network Volume is not version-controlled. After major milestones
      (v1, v2 model releases), rsync the full /workspace to local cold storage.
    - >
      The Dukhrana Payne Smith wordlist (dukhrana.com/lexicon/PayneSmith/)
      supplements phase_2l lexicon correction. Download and save to
      /workspace/scripts/lexicons/dukhrana_payne_smith.txt.
    - >
      Consider registering the final corrected GT corpus with HTR-United
      for long-term citability and community reuse (CC BY 4.0 compatible).
