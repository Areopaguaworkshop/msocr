schema_version: msocr.docspec.v1
id: pipeline.handwritten_htr_training
title: Handwritten HTR Training Pipeline
purpose: Define high-accuracy handwritten HTR training and evaluation flow.
scope:
  project: msocr
  languages:
    - name: sogdian
      status: active
    - name: old_turkish
      status: active
    - name: greek
      status: planned
    - name: latin
      status: planned
    - name: syriac
      status: planned_custom_htr_required
    - name: coptic
      status: planned_custom_htr_required
  writing_modes:
    - handwritten
inputs:
  required:
    - target_language
    - writing_mode
    - split_manifest_id
    - model_config_id
  optional:
    - desired_accuracy
workflow:
  - step_id: HTR1
    name: route_assertion
    action: Enforce writing_mode equals handwritten.
  - step_id: HTR2
    name: preprocess_handwritten
    action: Apply manuscript and handwriting-oriented preprocessing.
  - step_id: HTR3
    name: train_htr_model
    action: Train handwriting profile with ketos wrapper or external workflow.
  - step_id: HTR4
    name: benchmark
    action: Evaluate CER and WER on frozen test set.
  - step_id: HTR5
    name: gate
    action: Apply handwritten threshold and review policy.
metrics:
  primary:
    - CER
  secondary:
    - WER
thresholds:
  handwritten:
    cer_max: 0.10
  rule: Manual review if handwritten gate fails or model availability is uncertain.
fallback:
  failed_or_unstable:
    - collect_additional_ground_truth_lines
    - retrain_with_adjusted_profile
    - set_needs_manual_review_true
outputs:
  artifacts:
    - handwritten_model
    - handwritten_benchmark_report
    - review_flag
integration:
  implemented_modules:
    - msocr/preprocessing/pipeline.py
    - msocr/training/ketos_trainer.py
    - msocr/models/inference.py
  planned_modules:
    - public_model_registry_check
    - external_connector_escriptorium
    - external_connector_transkribus
status:
  maturity: active_blueprint
  implementation_state: documentation_defined
owners:
  - role: handwritten_htr
    team: msocr
last_updated: 2026-02-12
